# Machine-readable finite_element_options architecture contract.
# The repository now uses a real PEP 621 package namespace under
# src/finite_element_options. The top-level directory named src is only the
# standard source-layout container and must not be exported as an import package.

[contract]
schema_version = 2
name = "finite_element_options"
mode = "namespaced-src-layout"

[paths]
package_root = "src/finite_element_options"
tests_root = "tests"

[topology]
allowed_root_modules = [
  "__init__.py",
  "cli.py",
  "data_utils.py",
  "fdsolver.py",
  "jax_greeks.py",
  "plots.py",
  "sidebar.py",
  "transform.py",
]
required_top_level_packages = [
  "contracts",
  "core",
  "estimation",
  "examples",
  "problems",
  "space",
  "time_integration",
  "validation",
]
allowed_top_level_packages = [
  "contracts",
  "core",
  "estimation",
  "examples",
  "problems",
  "space",
  "time_integration",
  "validation",
]
max_top_level_package_count = 8
ignore_top_level_dirs = []

[repository_root]
allowed_python_files = []

[documentation]
required_docs = ["docs/ARCHITECTURE.md", "README.md"]
required_fragments = ["docs/architecture_contract.toml", "architecture contract", "finite_element_options"]

[ci]
workflow_paths = [".github/workflows/ci.yml"]
required_fragments = ["scripts/check_architecture_contract.py", "tests/architecture", "tests/test_packaging_contract.py"]

[[import_rules]]
source = "src/finite_element_options/core"
forbidden_prefixes = ["streamlit", "matplotlib", "plotly", "pandas", "pymc", "jax", "numba", "xarray", "pyarrow", "statsmodels", "findiff"]

[[import_rules]]
source = "src/finite_element_options/space"
forbidden_prefixes = ["streamlit", "plotly", "pandas", "pymc", "jax", "numba", "xarray", "pyarrow", "statsmodels", "findiff"]
